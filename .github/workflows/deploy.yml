name: Deploy Site
on:
  push:
    branches: [main]
    paths: ['site/**', 'data/**']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy folder
        run: |
          mkdir _deploy
          cp site/* _deploy/
          cp -r data _deploy/data
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - id: deployment
        uses: actions/deploy-pages@v4
