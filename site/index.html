<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Price Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header */
    header { margin-bottom: 1.75rem; }

    header h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.375rem;
      letter-spacing: -0.01em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .header-subtitle { color: #64748b; font-size: 0.8125rem; }

    #last-updated {
      color: #94a3b8;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Flight list */
    .flight-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .flight-item {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.8125rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
      user-select: none;
    }

    .flight-item:hover {
      border-color: #bfdbfe;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .flight-item.active {
      border-color: #93c5fd;
      background: #f0f7ff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.07);
    }

    .indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .indicator.green { background: #22c55e; }
    .indicator.amber { background: #f59e0b; }
    .indicator.red   { background: #ef4444; }

    .flight-label {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: #334155;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .flight-range { display: flex; gap: 1.125rem; flex-shrink: 0; }

    .range-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .range-item .range-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #cbd5e1;
    }

    .range-item .range-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #64748b;
    }

    .current-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      font-weight: 600;
      color: #2563eb;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 0.3rem 0.625rem;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ---- Heuristic card ---- */
    .heuristic-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1.125rem 1.25rem 1rem;
      margin-bottom: 1.5rem;
    }

    .hcard-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .tier-badge {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .tier-buy  { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .tier-good { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .tier-hold { background: #fef9c3; color: #a16207; border: 1px solid #fde047; }
    .tier-skip { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }

    .hcard-price-block {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .hcard-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 600;
      color: #0f172a;
    }

    .alltime-badge {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #15803d;
      background: #dcfce7;
      border: 1px solid #86efac;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    /* Quality bar */
    .hcard-metrics {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      margin-bottom: 0.875rem;
    }

    .hmetric {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hmetric-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
      width: 72px;
      flex-shrink: 0;
    }

    .quality-bar-wrap {
      flex: 1;
      max-width: 200px;
      height: 6px;
      background: #f1f5f9;
      border-radius: 3px;
      overflow: hidden;
    }

    .quality-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .hmetric-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #475569;
      min-width: 48px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }
    .pill-high   { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .pill-medium { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
    .pill-low    { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
    .pill-conf-high   { background: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd; }
    .pill-conf-medium { background: #faf5ff; color: #7e22ce; border: 1px solid #d8b4fe; }
    .pill-conf-low    { background: #f8fafc; color: #64748b; border: 1px solid #cbd5e1; }

    /* Reasons */
    .hcard-reasons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.875rem;
    }

    .reason-chip {
      font-size: 0.6875rem;
      color: #475569;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      line-height: 1.4;
    }

    /* Signal toggle */
    .signal-toggle {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #64748b;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
      margin-bottom: 0.75rem;
    }
    .signal-toggle:hover { border-color: #93c5fd; color: #2563eb; }

    /* Signal breakdown table */
    .hcard-signals {
      border: 1px solid #f1f5f9;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0.875rem;
    }

    .signal-row {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #f8fafc;
    }
    .signal-row:last-child { border-bottom: none; }
    .signal-row.inactive { opacity: 0.45; }

    .sig-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: #475569;
    }

    .sig-desc {
      font-size: 0.6875rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    .sig-score-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .sig-bar-wrap {
      width: 60px;
      height: 4px;
      background: #f1f5f9;
      border-radius: 2px;
      overflow: hidden;
    }

    .sig-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #3b82f6;
    }

    .sig-score-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6875rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    .hcard-updated {
      font-size: 0.6875rem;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Chart section */
    .chart-section {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1.125rem 1.25rem 1rem;
      margin-bottom: 1.5rem;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.875rem;
      gap: 1rem;
    }

    .chart-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #475569;
    }

    .selector select {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.3rem 0.625rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.12s;
    }
    .selector select:focus { border-color: #93c5fd; }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
    .empty-state p {
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
      font-size: 0.875rem;
    }

    /* Footer */
    footer {
      text-align: center;
      color: #94a3b8;
      font-size: 0.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e2e8f0;
    }
    footer a { color: #3b82f6; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.125rem; }
      .flight-range { display: none; }
      .flight-item { padding: 0.75rem 0.875rem; }
      .container { padding: 1rem; }
      .hcard-top { gap: 0.625rem; }
      .hcard-price { font-size: 1rem; }
      .signal-row { grid-template-columns: 110px 1fr auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Flight Price Tracker</h1>
      <div class="header-meta">
        <span class="header-subtitle">Tracking Wizzair prices hourly</span>
        <span id="last-updated"></span>
      </div>
    </header>

    <div id="flight-list" class="flight-list"></div>

    <div id="heuristic-card" class="heuristic-card" style="display:none;">
      <div class="hcard-top">
        <span id="hcard-tier" class="tier-badge"></span>
        <div class="hcard-price-block">
          <span id="hcard-price" class="hcard-price"></span>
          <span id="hcard-alltime" class="alltime-badge" style="display:none;">all-time low</span>
        </div>
      </div>
      <div class="hcard-metrics">
        <div class="hmetric">
          <span class="hmetric-label">Quality</span>
          <div class="quality-bar-wrap">
            <div id="hcard-quality-bar" class="quality-bar-fill" style="width:0%"></div>
          </div>
          <span id="hcard-quality-val" class="hmetric-val"></span>
        </div>
        <div class="hmetric">
          <span class="hmetric-label">Confidence</span>
          <span id="hcard-confidence" class="pill"></span>
        </div>
      </div>
      <div id="hcard-reasons" class="hcard-reasons"></div>
      <button class="signal-toggle" id="hcard-toggle" onclick="toggleSignals()">Show signals ▾</button>
      <div id="hcard-signals" class="hcard-signals" style="display:none;"></div>
      <div id="hcard-updated" class="hcard-updated"></div>
    </div>

    <div id="chart-section" class="chart-section" style="display:none;">
      <div class="chart-header">
        <span class="chart-title">Price history</span>
        <div id="selector-container" class="selector" style="display:none;">
          <select id="flight-select"></select>
        </div>
      </div>
      <canvas id="price-chart"></canvas>
    </div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>No data yet. Go to the Actions tab on GitHub and run the workflow manually to start tracking.</p>
    </div>

    <footer></footer>
  </div>

  <script>
    let chart = null;
    let signalsVisible = false;

    const SIGNAL_META = {
      dowPercentile:     { name: 'Day-of-week',       desc: 'Price vs same weekday in the fare window' },
      bucketPosition:    { name: 'Fare bucket',        desc: 'Position in detected price tier ladder (1 = cheapest)' },
      dtdFloor:          { name: 'Booking-stage',      desc: 'vs cheapest observed at this days-to-departure' },
      siblingIndependence:{ name: 'Nearby dates',      desc: 'Whether adjacent dates are cheaper than this one' },
      absoluteFloor:     { name: 'All-time low',       desc: 'Proximity to historical minimum price' },
      windowTrend:       { name: 'Window trend',       desc: 'Direction of surrounding fare prices over time' },
    };

    function formatFlightId(id) {
      const parts = id.split('-');
      if (parts.length >= 4) {
        const origin = parts[0].toUpperCase();
        const dest = parts[1].toUpperCase();
        const dateStr = parts.slice(2).join('-');
        const d = new Date(dateStr + 'T00:00:00');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${origin} \u2192 ${dest} \u00b7 ${months[d.getMonth()]} ${d.getDate()}`;
      }
      return id;
    }

    function sortedFlightIds(ids) {
      return [...ids].sort((a, b) => {
        const dateValue = id => {
          const parts = id.split('-');
          if (parts.length >= 4) {
            return new Date(parts.slice(2).join('-') + 'T00:00:00').getTime();
          }
          return 0;
        };
        return dateValue(a) - dateValue(b);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function qualityColor(q) {
      if (q >= 75) return '#22c55e';
      if (q >= 55) return '#3b82f6';
      if (q >= 40) return '#f59e0b';
      return '#ef4444';
    }

    function renderHeuristicCard(id, analysisData) {
      const card = document.getElementById('heuristic-card');
      const a = analysisData && analysisData[id];
      if (!a) { card.style.display = 'none'; return; }

      card.style.display = 'block';

      // Tier badge
      const tierEl = document.getElementById('hcard-tier');
      const tierMap = {
        'BUY NOW':   'tier-buy',
        'GOOD DEAL': 'tier-good',
        'HOLD':      'tier-hold',
        'SKIP':      'tier-skip',
      };
      tierEl.className = 'tier-badge ' + (tierMap[a.tier] || 'tier-skip');
      tierEl.textContent = a.tier || '—';

      // Price + all-time low
      const priceEl = document.getElementById('hcard-price');
      priceEl.textContent = a.currentPrice != null
        ? a.currentPrice.toLocaleString() + '\u00a0' + (a.currency || '')
        : '—';
      const alltimeEl = document.getElementById('hcard-alltime');
      const isAllTimeLow = a.currentPrice != null && a.allTimeMin != null
        && a.currentPrice <= a.allTimeMin;
      alltimeEl.style.display = isAllTimeLow ? 'inline-flex' : 'none';

      // Quality bar
      const q = a.quality ?? 0;
      document.getElementById('hcard-quality-bar').style.width = q + '%';
      document.getElementById('hcard-quality-bar').style.background = qualityColor(q);
      document.getElementById('hcard-quality-val').textContent = q + ' / 100';

      // Confidence pill
      const confEl = document.getElementById('hcard-confidence');
      const confClass = { high: 'pill-conf-high', medium: 'pill-conf-medium', low: 'pill-conf-low' };
      confEl.className = 'pill ' + (confClass[a.confidence] || 'pill-conf-low');
      confEl.textContent = (a.confidence || 'low').toUpperCase();

      // Reasons chips
      const reasonsEl = document.getElementById('hcard-reasons');
      reasonsEl.innerHTML = '';
      if (a.reasons && a.reasons.length > 0) {
        for (const r of a.reasons) {
          const chip = document.createElement('span');
          chip.className = 'reason-chip';
          chip.textContent = r;
          reasonsEl.appendChild(chip);
        }
      }

      // Signal breakdown
      const sigsEl = document.getElementById('hcard-signals');
      sigsEl.innerHTML = '';
      if (a.signals) {
        for (const [key, sig] of Object.entries(a.signals)) {
          const meta = SIGNAL_META[key] || { name: key, desc: '' };
          const pct = sig.max > 0 ? (sig.value / sig.max) * 100 : 0;
          const row = document.createElement('div');
          row.className = 'signal-row' + (sig.active ? '' : ' inactive');
          row.innerHTML = `
            <div>
              <div class="sig-name">${escapeHtml(meta.name)}</div>
            </div>
            <div class="sig-desc">${escapeHtml(meta.desc)}${!sig.active ? ' <em>(no data)</em>' : ''}</div>
            <div class="sig-score-wrap">
              <div class="sig-bar-wrap">
                <div class="sig-bar-fill" style="width:${sig.active ? pct : 0}%"></div>
              </div>
              <span class="sig-score-text">${sig.active ? sig.value + '\u00a0/\u00a0' + sig.max : '—'}</span>
            </div>
          `;
          sigsEl.appendChild(row);
        }
      }

      // Updated
      const updEl = document.getElementById('hcard-updated');
      if (a.timestamp) {
        updEl.textContent = 'Updated ' + new Date(a.timestamp).toLocaleString();
      } else {
        updEl.textContent = '';
      }

      // Reset toggle state when switching flights
      signalsVisible = false;
      sigsEl.style.display = 'none';
      document.getElementById('hcard-toggle').textContent = 'Show signals \u25be';
    }

    function toggleSignals() {
      signalsVisible = !signalsVisible;
      document.getElementById('hcard-signals').style.display = signalsVisible ? 'block' : 'none';
      document.getElementById('hcard-toggle').textContent = signalsVisible
        ? 'Hide signals \u25b4'
        : 'Show signals \u25be';
    }

    async function init() {
      let data, analysisData;
      try {
        const res = await fetch('data/prices.json');
        if (!res.ok) throw new Error('not found');
        data = await res.json();
      } catch {
        data = {};
      }
      try {
        const res = await fetch('data/analysis.json');
        analysisData = res.ok ? await res.json() : {};
      } catch {
        analysisData = {};
      }

      const rawIds = Object.keys(data).filter(id => data[id].length > 0);
      if (rawIds.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }

      const flightIds = sortedFlightIds(rawIds);

      // Last updated (global)
      const allEntries = flightIds.flatMap(id => data[id]);
      const lastTimestamp = allEntries.reduce(
        (latest, e) => e.timestamp > latest ? e.timestamp : latest, ''
      );
      if (lastTimestamp) {
        document.getElementById('last-updated').textContent =
          'Updated ' + new Date(lastTimestamp).toLocaleString();
      }

      // Build flight rows
      const listEl = document.getElementById('flight-list');
      const cardData = {};

      for (const id of flightIds) {
        const entries = data[id];
        const prices = entries.filter(e => e.price !== null).map(e => e.price);
        const currency = entries.find(e => e.currency)?.currency || 'RON';
        const latestPrice = entries[entries.length - 1].price;
        const min = prices.length ? Math.min(...prices) : null;
        const max = prices.length ? Math.max(...prices) : null;

        let indicatorClass = 'amber';
        if (latestPrice !== null && min !== null && max !== null) {
          const range = max - min;
          if (range === 0 || latestPrice <= min * 1.1) indicatorClass = 'green';
          else if (latestPrice >= max * 0.9) indicatorClass = 'red';
        }

        cardData[id] = { min, max, currency, prices };

        const item = document.createElement('div');
        item.className = 'flight-item';
        item.dataset.id = id;
        item.innerHTML = `
          <div class="indicator ${indicatorClass}"></div>
          <span class="flight-label">${escapeHtml(formatFlightId(id))}</span>
          <div class="flight-range">
            <div class="range-item">
              <span class="range-label">Min</span>
              <span class="range-value">${min !== null ? min.toLocaleString() : '—'}</span>
            </div>
            <div class="range-item">
              <span class="range-label">Max</span>
              <span class="range-value">${max !== null ? max.toLocaleString() : '—'}</span>
            </div>
          </div>
          <div class="current-badge">${latestPrice !== null ? latestPrice.toLocaleString() + '\u00a0' + currency : 'N/A'}</div>
        `;

        item.addEventListener('click', () => {
          setActiveItem(id);
          renderHeuristicCard(id, analysisData);
          renderChart(data, id, cardData);
          const sel = document.getElementById('flight-select');
          if (sel) sel.value = id;
        });

        listEl.appendChild(item);
      }

      // Flight selector (for chart)
      const select = document.getElementById('flight-select');
      for (const id of flightIds) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = formatFlightId(id);
        select.appendChild(opt);
      }

      if (flightIds.length > 1) {
        document.getElementById('selector-container').style.display = 'block';
        select.addEventListener('change', () => {
          setActiveItem(select.value);
          renderHeuristicCard(select.value, analysisData);
          renderChart(data, select.value, cardData);
        });
      }

      document.getElementById('chart-section').style.display = 'block';
      setActiveItem(flightIds[0]);
      renderHeuristicCard(flightIds[0], analysisData);
      renderChart(data, flightIds[0], cardData);
    }

    function setActiveItem(id) {
      document.querySelectorAll('.flight-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });
    }

    function renderChart(data, flightId, cardData) {
      const entries = data[flightId];
      const { min: minPrice, currency } = cardData[flightId];

      const dataPoints = entries.map(e => ({ x: new Date(e.timestamp), y: e.price }));

      const ctx = document.getElementById('price-chart').getContext('2d');
      if (chart) chart.destroy();

      const gradient = ctx.createLinearGradient(0, 0, 0, 280);
      gradient.addColorStop(0, 'rgba(59,130,246,0.1)');
      gradient.addColorStop(1, 'rgba(59,130,246,0)');

      const datasets = [
        {
          label: `Price (${currency})`,
          data: dataPoints,
          borderColor: '#3b82f6',
          backgroundColor: gradient,
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          pointBackgroundColor: '#3b82f6',
          pointBorderColor: '#ffffff',
          pointBorderWidth: 2,
          spanGaps: false,
        }
      ];

      if (minPrice !== null) {
        datasets.push({
          label: `Low: ${minPrice.toLocaleString()} ${currency}`,
          data: dataPoints.map(p => ({ x: p.x, y: minPrice })),
          borderColor: '#22c55e',
          borderDash: [5, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          tension: 0,
        });
      }

      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          aspectRatio: window.innerWidth < 600 ? 1.4 : 2.8,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: {
                color: '#94a3b8',
                font: { family: 'Inter', size: 11 },
                boxWidth: 14,
                padding: 14,
              }
            },
            tooltip: {
              backgroundColor: '#ffffff',
              titleColor: '#0f172a',
              bodyColor: '#475569',
              borderColor: '#e2e8f0',
              borderWidth: 1,
              titleFont: { family: 'Inter', weight: '600', size: 12 },
              bodyFont: { family: 'JetBrains Mono', size: 12 },
              padding: 10,
              callbacks: {
                title: items => items.length ? new Date(items[0].parsed.x).toLocaleString() : '',
                label: item => {
                  if (item.datasetIndex !== 0) return null;
                  const val = item.parsed.y;
                  return val !== null ? ` ${val.toLocaleString()} ${currency}` : ' No data';
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: 'hour',
                stepSize: 1,
                tooltipFormat: 'MMM d HH:mm',
                displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' }
              },
              ticks: { color: '#94a3b8', font: { family: 'Inter', size: 10 }, maxRotation: 45 },
              grid: { color: '#f1f5f9' },
              border: { color: '#e2e8f0' },
            },
            y: {
              title: { display: true, text: currency, color: '#94a3b8', font: { family: 'Inter', size: 11 } },
              ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 11 } },
              grid: { color: '#f8fafc' },
              border: { color: '#e2e8f0' },
            }
          }
        }
      });
    }

    init();
  </script>
</body>
</html>
